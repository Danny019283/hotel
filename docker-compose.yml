services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: hotel-sqlserver
    hostname: hotel-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: "${DB_PASSWORD}"
    ports:
      - "1433:1433"
    volumes:
      - hotel_sqlserver_data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  sqlserver-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: hotel-sqlserver-init
    environment:
      MSSQL_SA_PASSWORD: "${DB_PASSWORD}"
    depends_on:
      sqlserver:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - >
        /opt/mssql-tools18/bin/sqlcmd
        -S sqlserver
        -U sa
        -P "$$MSSQL_SA_PASSWORD"
        -C
        -Q "IF DB_ID(N'hotel') IS NULL CREATE DATABASE hotel;"
    restart: "no"

  server:
    build:
      context: ./server
    container_name: hotel-server
    depends_on:
      sqlserver:
        condition: service_healthy
      sqlserver-init:
        condition: service_completed_successfully
    env_file:
      - server/.env
    environment:
      DB_SERVER: sqlserver,1433
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: hotel-frontend
    depends_on:
      server:
        condition: service_started
    ports:
      - "5173:5173"
    restart: unless-stopped

volumes:
  hotel_sqlserver_data:
